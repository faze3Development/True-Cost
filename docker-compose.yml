version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: truecost_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-truecost}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: truecost_redis
    ports:
      # Default to ephemeral host port (0) to avoid conflicts; override with REDIS_PORT if you need a fixed port.
      - "${REDIS_PORT:-0}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: truecost_api
    env_file:
      - Server/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8080}:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: truecost_worker
    env_file:
      - Server/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  directus:
    image: directus/directus:latest
    container_name: truecost_directus
    ports:
      - "8055:8055"
    environment:
      KEY: "truecost-key"
      SECRET: "truecost-secret"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin"
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: "truecost"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_SEARCH_PATH: "public,logs"
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      CACHE_REDIS: "redis://redis:6379"
      REDIS: "redis://redis:6379"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
